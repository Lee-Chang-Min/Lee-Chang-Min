name: Update latest blog posts

on:
  schedule:
    - cron: "0 0 * * *" # 매일 오전 9시(KST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://bestdeveloper.tistory.com/rss"
          max_post_count: 3
          comment_tag_name: "BLOG-POST-LIST"
          template: "- [$title]($url) · $date$newline"
          date_format: "yyyy.mm.dd"
